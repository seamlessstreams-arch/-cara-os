name: CI

# Runs the test suite and a production build on every PR to main and on pushes
# to main and the active development branch. Replaces the previously-removed
# boilerplate workflows so the ~114k vitest suite actually guards main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/cornerstone-platform-build]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The tsc baseline was burned down 1178 → 0 (PRs #711–#718). The build
      # itself keeps ignoreBuildErrors:true (deploys never block on types),
      # so this job is what holds the line at zero.
      - name: tsc --noEmit (baseline locked at 0)
        run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  guards:
    name: Repo guards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Rebrand guard (no legacy brand terms)
        run: node scripts/check-rebrand.js

      - name: AI-gateway guard (all AI calls via the gateway)
        run: node scripts/check-ai-gateway.js

      - name: Seed-cast guard (no member casts hiding incomplete seeds)
        run: node scripts/check-seed-casts.js

      - name: JSON-body guard (no raw req.json in API routes)
        run: node scripts/check-json-body.js

      - name: RLS guard (no anon-reachable tables or open policies)
        run: node scripts/check-rls.js

      - name: Demo-seed guard (no ungated client-side demo fiction on live tenants)
        run: node scripts/check-demo-seed.js

      - name: Seed-refs guard (every seeded person reference resolves to a roster id)
        run: node scripts/check-seed-refs.js

  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (vitest)
        run: npx vitest run
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npx next build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # CI has no AI/Supabase secrets — the app must build without them
          # (providers are lazily read at request time; build stays clean).
          NEXT_TELEMETRY_DISABLED: "1"

  live-crawl:
    # The go-live acceptance test: build as a worst-case live tenant
    # (NEXT_PUBLIC_CARA_MODE=live, no Supabase keys — every demo fallback
    # under maximum pressure) and drive a real browser over every page that
    # has ever carried demo fiction, asserting none of the seeded demo world
    # renders and nothing crashes on the empty store. The static guards prove
    # the KNOWN patterns are gated; only this proves no NEW render path leaks
    # (pages are client-rendered — HTML-shell checks are vacuous). Found 2
    # leaks the static guard passed (#764).
    name: Live fiction crawl
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build as a live tenant (no Supabase keys)
        run: npx next build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_TELEMETRY_DISABLED: "1"
          # The worst-case misconfigured live tenant: mode=live with the
          # Supabase keys explicitly absent, so every `if (!supabaseEnabled)`
          # demo fallback fires and every gate is under maximum pressure. The
          # crawl's own sentinel (the /data-persistence status page) fails the
          # run if keys ever leak in and it silently reads "Durable mode".
          NEXT_PUBLIC_CARA_MODE: live
          NEXT_PUBLIC_SUPABASE_URL: ""
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ""

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Crawl every fiction-bearing page as a live tenant
        run: node scripts/live-fiction-crawl.mjs
